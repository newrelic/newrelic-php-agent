services:
# The Database
  mysqldb:
    platform: linux/amd64
    image: mysql:5.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: database
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOST: mysqldb
    healthcheck:
      test: ["CMD", "mysql", "--user=admin", "--password=admin", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - var-run-mysqld:/var/run/mysqld
  redisdb:
    image: redis
    restart: always
  redisclusterdb:
    image: redis
    restart: always
    command: >
      sh -c '
        redis-server --port 7000 --cluster-enabled yes --cluster-config-file /tmp/nodes.conf &
        PID=$$!
        until redis-cli -p 7000 ping >/dev/null 2>&1; do sleep 0.2; done
        redis-cli -p 7000 cluster addslotsrange 0 16383
        wait $$PID
      '
  memcached:
    image: memcached:latest
    restart: always
  postgres:
    image: postgres
    restart: always
    environment:
       POSTGRES_PASSWORD: root
       POSTGRES_USER: postgres
  php:
    platform: ${PLATFORM:-}
    image: newrelic/nr-php-agent-builder:make-php-${PHP:-8.2}-${LIBC:-gnu}-${IMAGE_VERSION:-v1}

    environment:
      MEMCACHE_HOST: memcached

      MYSQL_DB: database
      MYSQL_USER: admin
      MYSQL_PASSWD: admin
      MYSQL_HOST: mysqldb
      MYSQL_SOCKET: /var/run/mysqld/mysqld.sock

      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PW: root

      PREDIS_HOME: /usr/src/vendor/predis/predis/
      REDIS_HOST: redisdb
      REDIS_CLUSTER_HOST: redisclusterdb
      REDIS_CLUSTER_PORT: 7000

    volumes:
       - ${AGENT_CODE:-$PWD}:/usr/local/src/newrelic-php-agent
       - var-run-mysqld:/var/run/mysqld
    entrypoint: tail
    command: -f /dev/null
    container_name: nr-php
    profiles: ["test"]
  devenv:
    build:
      context: .
      dockerfile: files/Dockerfile
      args:
        PHP_VER: ${PHP:-8.3}
    environment:
      MEMCACHE_HOST: memcached

      MYSQL_DB: database
      MYSQL_USER: admin
      MYSQL_PASSWD: admin
      MYSQL_HOST: mysqldb
      MYSQL_SOCKET: /var/run/mysqld/mysqld.sock

      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PW: root

      PREDIS_HOME: /usr/src/vendor/predis/predis/
      REDIS_HOST: redisdb
      REDIS_CLUSTER_HOST: redisclusterdb
      REDIS_CLUSTER_PORT: 7000

      PS1: "New Relic > "
      NEWRELIC_COLLECTOR_HOST : ${NEW_RELIC_COLLECTOR_HOST:-collector.newrelic.com}
      NEWRELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
    volumes:
       - ${PWD}:/usr/src/myapp
       - var-run-mysqld:/var/run/mysqld
    working_dir: /usr/src/myapp
    stdin_open: true
    tty: true
    profiles: ["dev"]

volumes:
  var-run-mysqld:
